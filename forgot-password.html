<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | VEXTRON</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/theme-overrides.css?v=20260708-1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/supabase-config.js" defer></script>
    <script src="js/forgot-password-auth.js" defer></script>
</head>
<body>
    <main>
        <section class="login-page" aria-label="Reset VEXTRON password">
            <a class="login-back-home" href="login.html" aria-label="Back to login">
                <span aria-hidden="true">&larr;</span>
                Back to login
            </a>
            <div class="login-shell">
                <div class="login-card login-card-compact" aria-label="VEXTRON password reset request">
                    <div class="login-brand">
                        <img src="assets/written-logo.png" alt="VEXTRON">
                    </div>

                    <form class="login-form" id="forgot-password-form" novalidate>
                        <label>
                            <span><b>*</b> Email</span>
                            <input id="forgot-email" name="email" type="email" placeholder="Type your email here." autocomplete="email" required>
                        </label>
                        <button id="forgot-submit" type="submit">
                            Send Reset Link
                        </button>
                    </form>

                    <p class="login-auth-status" id="forgot-auth-status" role="status" aria-live="polite"></p>

                    <p class="login-register">Remember your password? <a href="login.html">Login</a></p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
