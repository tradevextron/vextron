<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard | VEXTRON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="../js/supabase-config.js" defer></script>
</head>
<body>
    <aside class="sidebar is-collapsed" aria-label="Customer dashboard sidebar">
        <button class="brand-lockup" type="button" aria-label="Expand sidebar" aria-expanded="false">
            <img class="brand-mark" src="../assets/navbar-logo.png" alt="">
            <img class="brand-wordmark" src="../assets/written-logo.png" alt="VEXTRON">
            <span class="rail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <rect x="3" y="4" width="18" height="16" rx="3"></rect>
                    <path d="M9 4v16"></path>
                    <path d="m15 9 3 3-3 3"></path>
                </svg>
            </span>
        </button>
        <button class="profile-card" type="button" aria-label="Customer profile">
            <span class="profile-avatar" aria-hidden="true" data-profile-avatar>V</span>
            <span class="profile-info">
                <span class="profile-name" data-profile-name>Customer</span>
                <span class="profile-status" data-profile-plan>Plan</span>
            </span>
        </button>
    </aside>
    <main class="dashboard-main" aria-label="Customer dashboard">
        <section class="payment-gate" data-payment-gate hidden>
            <p data-payment-status>Preparing your secure checkout...</p>
            <button type="button" data-payment-retry hidden>Continue To Payment</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
