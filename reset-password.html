<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | VEXTRON</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/theme-overrides.css?v=20260708-1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/supabase-config.js" defer></script>
    <script src="js/reset-password-auth.js" defer></script>
</head>
<body>
    <main>
        <section class="login-page" aria-label="Set a new VEXTRON password">
            <a class="login-back-home" href="login.html" aria-label="Back to login">
                <span aria-hidden="true">&larr;</span>
                Back to login
            </a>
            <div class="login-shell">
                <div class="login-card login-card-compact" aria-label="VEXTRON new password form">
                    <div class="login-brand">
                        <img src="assets/written-logo.png" alt="VEXTRON">
                    </div>

                    <form class="login-form" id="reset-password-form" novalidate>
                        <label>
                            <span><b>*</b> New Password</span>
                            <input id="reset-password" name="password" type="password" placeholder="Create your new password." autocomplete="new-password" minlength="8" required>
                        </label>
                        <label>
                            <span><b>*</b> Rewrite Password</span>
                            <input id="reset-password-confirm" name="password-confirm" type="password" placeholder="Rewrite your new password." autocomplete="new-password" minlength="8" required>
                        </label>
                        <button id="reset-submit" type="submit">
                            Update Password
                        </button>
                    </form>

                    <p class="login-auth-status" id="reset-auth-status" role="status" aria-live="polite"></p>

                    <p class="login-register">Password updated? <a href="login.html">Login</a></p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
